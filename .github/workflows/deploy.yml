Web search name: Production Deployment



on:

  push:

    branches:

      - main



permissions:

  contents: read



concurrency:

  group: production-deploy

  cancel-in-progress: true



####################################################

# BACKEND BUILD

####################################################



jobs:

  backend-build:

    name: Build Backend

    runs-on: ubuntu-latest

    timeout-minutes: 15



    env:

      DATABASE_URL: ${{ secrets.DATABASE_URL }}



    defaults:

      run:

        working-directory: Backend



    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4



      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 20

          cache: npm

          cache-dependency-path: Backend/package-lock.json



      - name: Install Dependencies

        run: npm ci



      - name: Generate Prisma Client

        run: npx prisma generate



      - name: Build Backend

        run: npm run build --if-present





####################################################

# BACKEND DEPLOY

####################################################



  backend-deploy:

    name: Deploy Backend

    runs-on: ubuntu-latest

    needs: backend-build

    timeout-minutes: 10



    steps:

      - name: Trigger Render Deploy

        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"





####################################################

# FRONTEND DEPLOY (FIXED - NO VERCEL BUILD)

####################################################



  frontend-deploy:

    name: Deploy Frontend

    runs-on: ubuntu-latest

    timeout-minutes: 20



    defaults:

      run:

        working-directory: Frontend



    env:

      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}



    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4



      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 20

          cache: npm

          cache-dependency-path: Frontend/package-lock.json



      - name: Install Dependencies

        run: npm ci



      - name: Build Frontend (Vite)

        run: npm run build



      - name: Install Vercel CLI

        run: npm install -g vercel@latest



      - name: Deploy Frontend

        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}





####################################################

# ADMIN DEPLOY (FIXED SAME WAY)

####################################################



  admin-deploy:

    name: Deploy Admin

    runs-on: ubuntu-latest

    timeout-minutes: 20



    defaults:

      run:

        working-directory: Admin



    env:

      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}



    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4



      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 20

          cache: npm

          cache-dependency-path: Admin/package-lock.json



      - name: Install Dependencies

        run: npm ci



      - name: Build Admin (Vite)

        run: npm run build



      - name: Install Vercel CLI

        run: npm install -g vercel@latest



      - name: Deploy Admin

        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}