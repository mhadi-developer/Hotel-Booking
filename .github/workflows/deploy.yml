name: Production Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:

  ####################################################
  # BACKEND BUILD
  ####################################################

  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # - name: Run Tests
      #   run: npm test

      - name: Build Backend
        run: npm run build --if-present

  ####################################################
  # BACKEND DEPLOY
  ####################################################

  backend-deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: backend-build

    steps:
      - name: Trigger Render Deploy
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  ####################################################
  # FRONTEND DEPLOY
  ####################################################

  frontend-deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: Frontend

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Environment
        run: vercel pull --yes --environment=production

      - name: Build Project
        run: vercel build --prod

      - name: Deploy
        run: vercel deploy --prebuilt --prod --yes

  ####################################################
  # ADMIN DEPLOY
  ####################################################

  admin-deploy:
    name: Deploy Admin
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: Admin

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Admin/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Environment
        run: vercel pull --yes --environment=production

      - name: Build Project
        run: vercel build --prod

      - name: Deploy
        run: vercel deploy --prebuilt --prod --yes